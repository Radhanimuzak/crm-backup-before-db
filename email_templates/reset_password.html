<!DOCTYPE html> <!-- START: Dokumen HTML, standard email template -->
<html>
<head>
<meta charset="UTF-8"> <!-- Encoding UTF-8 supaya support semua karakter -->
<title>Password Reset Request</title> <!-- Judul email (tidak selalu terlihat di inbox) -->
</head>

<!-- BODY START: Semua isi email -->
<body style="margin:0;padding:0;background:#f5f7fd;font-family:Arial, sans-serif;"> <!-- Styling global email -->

<!-- WRAPPER TABLE: Struktur utama email (email pakai table, bukan div) -->
<table width="100%" cellpadding="0" cellspacing="0" bgcolor="#f5f7fd"> <!-- Background luar -->
<tr>
<td align="center"> <!-- Center semua content -->

<!-- CONTAINER: Box utama email -->
<table width="500" cellpadding="0" cellspacing="0" bgcolor="#ffffff" style="margin-top:40px;border-radius:8px;">
<tr>
<td align="center" style="padding:40px;"> <!-- Padding dalam box -->

<!-- TITLE -->
<h2 style="color:#2a2f5b;margin:0;font-weight:bold;">
Password Reset Request
</h2> <!-- Tajuk utama email -->

<!-- INFO TEXT -->
<p style="color:#555;font-size:14px;margin-top:20px;line-height:1.6;">
We received a request to reset your password.
</p> <!-- Info: trigger dari user / sistem -->

<p style="color:#555;font-size:14px;line-height:1.6;">
Click the button below to create a new password for your account.
</p> <!-- Arahan kepada user -->

<!-- BUTTON RESET -->
<!--"{{reset_link}}" INPUT DARI BACKEND: link reset akan diganti oleh PHP -->
<a href="{{reset_link}}"  
style="
display:inline-block;
margin-top:25px;
padding:14px 28px;
background:#2a2f5b;
color:#ffffff;
text-decoration:none;
border-radius:6px;
font-size:14px;
font-weight:500;
">
Reset Password 
</a>
<!-- FUNGSI:
     - {{reset_link}} di-generate dari backend (contoh: PHP)
     - berisi token unik (contoh: reset.php?token=abc123)
     - Link ini akan mengarah ke halaman reset password -->

<!-- EXPIRY INFO -->
<p style="margin-top:25px;font-size:12px;color:#888;">
This link will expire in 15 minutes.
</p>
<!-- NOTE:
     - Expiry tidak dikawal di HTML
     - Dikawal di backend/database (timestamp/token expiry) -->

</td>
</tr>
</table>
<!-- END CONTAINER -->

</td>
</tr>
</table>
<!-- END WRAPPER -->

</body>
</html>
<!-- END: Template email -->
