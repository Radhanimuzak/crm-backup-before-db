<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Password Reset Request</title>
</head>

<body style="margin:0;padding:0;background:#f5f7fd;font-family:Arial, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" bgcolor="#f5f7fd">
<tr>
<td align="center">

<table width="500" cellpadding="0" cellspacing="0" bgcolor="#ffffff" style="margin-top:40px;border-radius:8px;">
<tr>
<td align="center" style="padding:40px;">

<h2 style="color:#2a2f5b;margin:0;font-weight:bold;">
Password Reset Request
</h2>

<p style="color:#555;font-size:14px;margin-top:20px;line-height:1.6;">
We received a request to reset your password.
</p>

<p style="color:#555;font-size:14px;line-height:1.6;">
Click the button below to create a new password for your account.
</p>

<a href="{{reset_link}}" 
style="
display:inline-block;
margin-top:25px;
padding:14px 28px;
background:#2a2f5b;
color:#ffffff;
text-decoration:none;
border-radius:6px;
font-size:14px;
font-weight:500;
">
Reset Password
</a>

<p style="margin-top:25px;font-size:12px;color:#888;">
This link will expire in 15 minutes.
</p>

</td>
</tr>
</table>

</td>
</tr>
</table>

</body>
</html>
