<!DOCTYPE html> <!-- START: Menentukan tipe dokumen HTML5 -->
<html>
<head>
<meta charset="UTF-8"> <!-- Setting encoding supaya support semua karakter -->
<title>Account Approved</title> <!-- Judul email (tidak selalu tampil di email client) -->
</head>

<body style="margin:0;padding:0;background:#f5f7fd;font-family:Arial, sans-serif;"> <!-- Body email, styling global -->

<!-- WRAPPER UTAMA EMAIL (FULL WIDTH) -->
<table width="100%" cellpadding="0" cellspacing="0" bgcolor="#f5f7fd"> <!-- Container luar (background email) -->
<tr>
<td align="center"> <!-- Semua isi ditengah -->

<!-- CONTAINER EMAIL (BOX UTAMA) -->
<table width="500" cellpadding="0" cellspacing="0" bgcolor="#ffffff" style="margin-top:40px;border-radius:10px;"> <!-- Box isi email -->
<tr>
<td align="center" style="padding:40px;"> <!-- Padding isi email -->

<!-- TITLE -->
<h2 style="color:#2a2f5b;margin:0;">
Your Role Has Been Assigned <!-- Static text (tidak berubah) -->
</h2>

<!-- DESKRIPSI ROLE -->
<p style="color:#555;font-size:14px;margin-top:20px;">
The administrator has assigned the role of 
<strong>{{role}}</strong> <!-- INPUT: Diambil dari backend (contoh: database user role) -->
</p>

<!-- INSTRUKSI USER -->
<p style="color:#555;font-size:14px;">
Please create your password to activate your account and access the system. <!-- Arahan ke user -->
</p>

<!-- BUTTON LINK -->
 <!-- "{{create_password_link}}" INPUT: Link dari backend  -->
<a href="{{create_password_link}}"  
style="
display:inline-block;
margin-top:25px;
padding:14px 28px;
background:#2a2f5b;
color:#ffffff;
text-decoration:none;
border-radius:6px;
font-weight:500;
font-size:14px;
">
Create Password <!-- Action button -->
</a>

</td>
</tr>
</table>
<!-- END CONTAINER EMAIL -->

</td>
</tr>
</table>
<!-- END WRAPPER -->

</body>
</html> <!-- END: Tamat HTML -->
